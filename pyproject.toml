[tool.pytest.ini_options]
markers = [
    "e2e: end-to-end tests that make real calls against facebook.com",
]
addopts = "-m 'not e2e' --cov=fb_scraper --cov=main --cov-report=term-missing --cov-fail-under=90"
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
source = ["fb_scraper", "main"]
# Playwright's sync API bridges into its internal asyncio loop via
# greenlets; without this, coverage.py's tracer misses statements that run
# across a greenlet switch (e.g. page.click()/is_visible() calls), even
# though they demonstrably execute - confirmed by hand before adding this.
concurrency = ["greenlet", "thread"]

[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort (import sorting)
    "UP",  # pyupgrade (modern syntax)
    "B",   # flake8-bugbear (common footguns)
]

[tool.mypy]
python_version = "3.13"
files = ["fb_scraper", "main.py"]
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true
# Permissive on purpose: the goal is catching real mismatches in a project
# that drives a browser and parses HTML (both inherently loosely-typed),
# not chasing --strict.
ignore_missing_imports = true
